name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server-tests:
    name: server-tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17.5-alpine@sha256:6567bca8d7bc8c82c5922425a0baee57be8402df92bae5eacad5f01ae9544daa
        env:
          POSTGRES_DB: toj_dev
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d toj_dev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/toj_dev
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/toj_test
      PGPASSWORD: postgres
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Create test database
        run: psql --host=localhost --username=postgres --dbname=toj_dev --command='CREATE DATABASE toj_test'
      - name: Migrate and test
        run: |
          bun run migrate
          DATABASE_URL="${TEST_DATABASE_URL}" bun run migrate
          bun test

  ios-debug-tests:
    name: ios-debug-tests
    runs-on: macos-26
    timeout-minutes: 45
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.5.app/Contents/Developer
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install CocoaPods dependencies
        run: |
          test -d "${DEVELOPER_DIR}"
          pod install
      - name: Select available iPhone simulator
        run: |
          destination_id="$(/usr/bin/python3 <<'PY'
          import json
          import re
          import subprocess

          payload = json.loads(subprocess.check_output(
              ["xcrun", "simctl", "list", "devices", "available", "-j"],
              text=True,
          ))

          def version(runtime):
              match = re.search(r"\.iOS-(\d+)-(\d+)(?:-(\d+))?$", runtime)
              return tuple(map(int, match.groups(default="0"))) if match else (-1,)

          for runtime in sorted(
              (item for item in payload["devices"] if ".iOS-" in item),
              key=version,
              reverse=True,
          ):
              for device in payload["devices"][runtime]:
                  if device.get("isAvailable") and device["name"].startswith("iPhone"):
                      print(device["udid"])
                      raise SystemExit(0)
          raise SystemExit("No available iPhone simulator")
          PY
          )"
          echo "DESTINATION_ID=${destination_id}" >> "${GITHUB_ENV}"
      - name: Run signed serialized simulator tests
        run: |
          xcodebuild test \
            -workspace Toj.xcworkspace \
            -scheme Toj \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=${DESTINATION_ID}" \
            -derivedDataPath "${RUNNER_TEMP}/TojDerivedData" \
            -resultBundlePath "${RUNNER_TEMP}/TojTests.xcresult" \
            -parallel-testing-enabled NO

  repository-policy-tests:
    name: repository-policy-tests
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Validate scripts, plist, and coturn policy
        run: |
          find scripts server/scripts -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n
          python3 infra/coturn/validate-peer-policy.py
          python3 - <<'PY'
          import plistlib
          from pathlib import Path

          with Path("Toj-Info.plist").open("rb") as source:
              plistlib.load(source)
          PY
      - name: Require immutable action references
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path

          failures = []
          for workflow in Path(".github/workflows").glob("*.yml"):
              for line_number, line in enumerate(workflow.read_text().splitlines(), 1):
                  match = re.search(r"^\s*-\s+uses:\s+([^\s#]+)", line)
                  if match and not re.search(r"@[0-9a-f]{40}$", match.group(1)):
                      failures.append(f"{workflow}:{line_number}: {match.group(1)}")
          if failures:
              raise SystemExit("Unpinned actions:\n" + "\n".join(failures))
          PY
